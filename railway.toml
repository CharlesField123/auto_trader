[build]
builder = "dockerfile"

[deploy]
# Futures scanner runs as a long-lived 24/5 worker, rescanning every 60s
# (1-minute bars) around the clock Monday–Friday. It rolls a fresh session each
# ET trading day and idles over the weekend, so it stays up across the week;
# "always" restarts it if it ever crashes overnight.
startCommand = "python main.py --futures"
restartPolicyType = "always"
restartPolicyMaxRetries = 10

# To run the original once-a-day StockAI stock bot instead, delete startCommand
# above and restore the cron:
#   cronSchedule = "30 13 * * 1-5"   # 13:30 UTC = 9:30 AM EDT, Mon–Fri
